# ============================================
# InvoiceGhost CI — Privacy-first invoice parser
# Runs on push/PR to main. Checks both backend
# (FastAPI) and frontend (Next.js).
# ============================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: FastAPI / Python ────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: ./backend/requirements.txt

      - name: Install system deps (poppler-utils)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Create .env for CI
        run: |
          cp .env.example .env
          echo "LICENSE_KEY_HMAC_SECRET=$(openssl rand -hex 32)" >> .env
          echo "TESTING=1" >> .env
          echo "ENVIRONMENT=ci" >> .env

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=report.xml

      - name: Type check (mypy)
        run: python -m mypy --ignore-missing-imports --explicit-package-bases main.py routers/ services/ models/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report-${{ matrix.python-version }}
          path: ./backend/report.xml

  # ─── Frontend: Next.js / TypeScript ──────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (type-check + compile)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://invoiceghost-backend.onrender.com
          NEXT_PUBLIC_GUMROAD_URL: https://gumroad.com/l/invoiceghost

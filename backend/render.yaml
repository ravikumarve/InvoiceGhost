services:
  - type: web
    name: invoiceghost-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "10"
      - key: ALLOWED_EXTENSIONS
        value: "pdf,png,jpg,jpeg,webp"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: LICENSE_KEY_HMAC_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: "production"
      - key: FRONTEND_URL
        value: "https://invoiceghost.vercel.app"
    healthCheckPath: /health
